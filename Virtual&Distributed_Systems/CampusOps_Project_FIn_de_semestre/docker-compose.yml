services:
  postgres:
    image: postgres:16-alpine
    container_name: campusops-postgres
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: campusops-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: campusops-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: campusops-bot
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      backend:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "if [ -z \"$TELEGRAM_BOT_TOKEN\" ] || [ \"$TELEGRAM_BOT_TOKEN\" = \"replace_with_your_telegram_bot_token\" ]; then echo 'TELEGRAM_BOT_TOKEN non configure: bot mis en attente'; tail -f /dev/null; else python bot/main.py; fi",
      ]

volumes:
  postgres_data:
